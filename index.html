<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Minimal</title>
    <style>
    :root {
        --bg: #f8f9fa;
        --card: #ffffff;
        --primary: #2d3436;
        --accent: #0984e3;
        --danger: #e74c3c;
        --success: #2ecc71;
        --border: #dfe6e9;
    }

    body {
        font-family: 'Segoe UI', Roboto, sans-serif;
        background-color: var(--bg);
        color: var(--primary);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 800px;
    }

    header {
        text-align: center;
        margin-bottom: 30px;
    }

    .layout {
        display: flex;
        gap: 20px;
        align-items: flex-start;
    }

   
    .left {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    
    .right {
        flex: 2;
    }

    .card {
        background-color: white;
        border-radius: 8px;
        padding: 16px;
        text-align: center;
        box-sizing: border-box;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .card:hover {
        transform: translateY(-2px);
        transition: 0.2s;
    }

    .chart-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px 0;
    }

    .circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        /* Default state: All green */
        background: conic-gradient(var(--success)    0% 100%);
        border: 5px solid var(--card);
        margin-bottom: 10px;
        transition: background 0.3s ease;
    }

    .text-red { color: var(--danger); }
    .text-green { color: var(--success); }

    input {
        display: block;
        margin: 8px 0;
        padding: 8px;
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 4px;
    }

    button {
        width: 100%;
        padding: 10px;
        background-color: var(--accent);
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .expense-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--card);
        border-radius: 8px;
        overflow: hidden;
    }

    .expense-table th,
    .expense-table td {
        padding: 12px;
        text-align: left;
    }

    .expense-table th {
        background: #f1f3f5;
        font-weight: 600;
    }

    .expense-table tr {
        border-bottom: 1px solid var(--border);
    }
    </style>
</head>
<body>
    
<div class="container">
    <header>
        <h1>Expense Tracker</h1>
    </header>

    <div class="layout">
        <div class="left">
            <div class="card">
                <h3>Add Expense</h3>
                <input id="name" placeholder="Item Name">
                <input id="amount" type="number" placeholder="Amount (₹)">
                <input id="category" placeholder="Category">
                <button onclick="addExpense()">Add Expense</button>
            </div>

            <div class="card">
                <h3>Total Budget</h3>
                <p>₹<span id="budget-display">10000</span></p>
            </div>

            <div class="card">
                <h3>Remaining Balance</h3>
                <p class="text-green">₹<span id="balance">10000</span></p>
            </div>
        </div>
  
        <div class="right">
            <div class="card">
                <h3>Expense Breakdown</h3>
                <div class="chart-section">
                    <div class="circle"></div>
                    <p><span class="text-red">Spent</span> vs <span class="text-green">Remaining</span></p>
                </div>
            </div>

            <div class="card">
                <table class="expense-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Amount</th>
                            <th>Category</th>
                            <th>Balance</th>
                        </tr>
                    </thead>
                    <tbody id="expense-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let balance = 10000;
let totalExpense = 0;

function addExpense() {
  const name = document.getElementById("name").value;
  const amount = Number(document.getElementById("amount").value);
  const category = document.getElementById("category").value;

  if (!name || !amount || !category) return;

  // update values
  totalExpense += amount;
  balance -= amount;

  // update balance UI
  document.getElementById("balance").textContent = balance;

  // update pie chart
  const percent = (totalExpense / 10000) * 100;

  document.querySelector(".circle").style.background =
    `conic-gradient(
      var(--danger) 0% ${percent}%,
      var(--success) ${percent}% 100%
    )`;

  // add row
  const table = document.querySelector("tbody");
  const row = document.createElement("tr");

  row.innerHTML = `
    <td>${name}</td>
    <td class="text-red">${amount}</td>
    <td>${category}</td>
    <td>${balance}</td>
  `;

  table.appendChild(row);

  // clear inputs
  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("category").value = "";
}
</script>   
</body>
</html>
